site_name: Dotty
site_description: >-
  Your self-hosted StackChan robot assistant.
  Open-source firmware, local ASR/TTS, pluggable LLM brain — no cloud required.
site_url: https://brettkinny.github.io/dotty-stackchan
repo_url: https://github.com/BrettKinny/dotty-stackchan
repo_name: BrettKinny/dotty-stackchan

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

nav:
  - Home: README.md
  - Getting Started: SETUP.md
  - Architecture: docs/architecture.md
  - Hardware:
      - Hardware: docs/hardware.md
      - Hardware Support: docs/hardware-support.md
  - Voice Pipeline: docs/voice-pipeline.md
  - Voice Catalog: docs/voice-catalog.md
  - Brain: docs/brain.md
  - Protocols: docs/protocols.md
  - OTA Verification: docs/ota-verification.md
  - Kid Mode: docs/kid-mode.md
  - LLM Backends: docs/llm-backends.md
  - Cookbook:
      - Change Persona: docs/cookbook/change-persona.md
      - Swap Voice: docs/cookbook/swap-voice.md
      - Run Fully Local: docs/cookbook/run-fully-local.md
      - Add Emoji: docs/cookbook/add-emoji.md
      - Disable Kid Mode: docs/cookbook/disable-kid-mode.md
  - Reference:
      - Emoji Mapping: docs/emoji-mapping.md
      - Interaction Map: docs/interaction-map.md
      - Latent Capabilities: docs/latent-capabilities.md
      - References: docs/references.md
  - Troubleshooting: docs/troubleshooting.md
  - FAQ: docs/faq.md
  - About: docs/about.md
  - Roadmap: ROADMAP.md
  - Contributing: CONTRIBUTING.md
  - Style Guide: docs/style.md
  - Security: SECURITY.md
  - Compatibility: COMPATIBILITY.md
  - Changelog: CHANGELOG.md

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
