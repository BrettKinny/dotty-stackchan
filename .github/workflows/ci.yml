name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install yamllint
      - name: Lint YAML files
        run: |
          cat > .yamllint.yml <<'EOF'
          extends: relaxed
          rules:
            line-length: disable
            truthy: disable
          EOF
          yamllint \
            .config.yaml \
            docker-compose.yml \
            compose.all-in-one.yml \
            compose.local.override.yml \
            mkdocs.yml

  compose-validate:
    name: Compose Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config > /dev/null
      - name: Validate compose.all-in-one.yml
        run: docker compose -f compose.all-in-one.yml config > /dev/null

  config-parse:
    name: Config Parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse .config.yaml
        run: python3 -c "import yaml; yaml.safe_load(open('.config.yaml'))"

  python-syntax:
    name: Python Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Python syntax
        run: |
          for f in bridge.py receiveAudioHandle.py $(find custom-providers -name '*.py'); do
            echo "Checking $f"
            python3 -c "import ast; ast.parse(open('$f').read())"
          done

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          pip install pytest
          pip install \
            'fastapi>=0.115,<1' \
            'uvicorn[standard]>=0.34,<1' \
            'pydantic>=2.9,<3' \
            'jinja2>=3.1,<4' \
            'python-multipart>=0.0.9,<1' \
            'prometheus-client>=0.20,<1' \
            'PyYAML>=6.0,<7' \
            'numpy>=1.24,<3'
      - name: Run bridge unit tests
        run: pytest tests/ -v --tb=short

  frontmatter-check:
    name: Frontmatter Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify YAML frontmatter in docs
        run: |
          fail=0
          for f in docs/*.md; do
            if ! head -1 "$f" | grep -q '^---$'; then
              echo "FAIL: $f missing YAML frontmatter"
              fail=1
            fi
          done
          exit $fail

  docs-links:
    name: Docs Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-private
            --offline
            docs/*.md
            *.md

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [yaml-lint, compose-validate, config-parse, python-syntax, python-tests, frontmatter-check, docs-links]
    if: failure()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      REPO: ${{ github.repository }}
      REF: ${{ github.ref_name }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Post Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          payload=$(jq -cn --arg t ":x: *CI failed* · \`${REPO}\` · \`${REF}\` — ${RUN_URL}" '{text: $t}')
          curl -fsS -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d "$payload"
      - name: Post Discord notification
        if: env.DISCORD_WEBHOOK_URL != ''
        run: |
          payload=$(jq -cn --arg c ":x: **CI failed** · \`${REPO}\` · \`${REF}\` — ${RUN_URL}" '{content: $c}')
          curl -fsS -X POST "$DISCORD_WEBHOOK_URL" -H 'Content-Type: application/json' -d "$payload"
