name: bridge-image

on:
  push:
    tags:
      - 'bridge-v*'
  pull_request:
    paths:
      - 'bridge.py'
      - 'bridge/**'
      - '.github/workflows/bridge-image.yml'
  workflow_dispatch:
    inputs:
      zeroclaw_version:
        description: "Pin zeroclaw crate version (blank = latest published)"
        required: false
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/brettkinny/zeroclaw-bridge
          tags: |
            type=ref,event=pr
            type=match,pattern=bridge-v(.*),group=1
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: bridge/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ZEROCLAW_VERSION=${{ github.event.inputs.zeroclaw_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
