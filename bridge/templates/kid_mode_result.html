{% if ok %}
<div class="alert alert-info dotty-alert"
     hx-get="/ui/kid-mode" hx-trigger="load delay:300ms" hx-swap="innerHTML" hx-target="#kid-card-body">
  Kid Mode &rarr; <span class="font-semibold">{{ "on" if new_state else "off" }}</span>
</div>
<script>window.dispatchEvent(new CustomEvent('dotty-refresh'));</script>
{% else %}
<div class="alert alert-error dotty-alert">{{ error or "Kid mode toggle failed." }}</div>
{% endif %}
