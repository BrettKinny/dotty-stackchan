<div class="card-body p-3">
  <div class="text-xs text-base-content/60 mb-2">Persona</div>
  {% if available %}
  <form hx-post="/ui/actions/persona" hx-target="#persona-card" hx-swap="outerHTML"
        class="flex items-center gap-2">
    <select name="name" class="select select-bordered select-sm flex-1"
            onchange="this.form.requestSubmit()">
      {% for p in available %}
      <option value="{{ p }}" {% if p == current %}selected{% endif %}>{{ p }}</option>
      {% endfor %}
    </select>
  </form>
  {% if switching %}
  <div class="alert alert-info py-2 text-xs mt-2">
    Switching to <strong>{{ current }}</strong> — bridge restarting…
  </div>
  {% elif error %}
  <div class="alert alert-error py-2 text-xs mt-2">{{ error }}</div>
  {% endif %}
  {% else %}
  <div class="text-xs text-base-content/50">
    No personas found at {{ "DOTTY_PERSONAS_DIR" }}.
  </div>
  {% endif %}
</div>
