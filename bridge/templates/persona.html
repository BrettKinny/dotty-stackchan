<div class="card-body p-3">
  <div class="text-xs text-base-content/60 mb-2">Persona</div>
  {% if available %}
  <div class="flex items-center gap-2">
    <div class="flex-1 text-sm font-mono">{{ current }}</div>
    <button type="button" class="btn btn-ghost btn-xs"
            hx-get="/ui/persona/view"
            hx-target="#persona-modal-content" hx-swap="innerHTML"
            hx-on::after-request="document.getElementById('persona-modal').showModal()"
            title="View the active persona file">
      view
    </button>
  </div>
  <div class="text-xs text-base-content/40 mt-1">
    Pinned by <code>PERSONA</code> env var in docker-compose. Change + redeploy to switch.
  </div>
  {% else %}
  <div class="text-xs text-base-content/50">
    🎭 No personas found at <code>{{ personas_dir }}</code>.
  </div>
  {% endif %}
</div>
