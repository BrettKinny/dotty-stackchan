<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1d232a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/ui/manifest.json">
<link rel="icon" type="image/svg+xml" href="/ui/icon.svg">
<link rel="apple-touch-icon" href="/ui/icon.svg">
<title>Dotty Admin</title>
<script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body { -webkit-tap-highlight-color: transparent; }
  .status-dot { width: 12px; height: 12px; border-radius: 9999px; flex-shrink: 0; }
  .status-ok { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.5); }
  .status-warn { background: #f59e0b; box-shadow: 0 0 8px rgba(245,158,11,0.5); }
  .status-bad { background: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.5); }
  .status-unknown { background: #6b7280; }
  .htmx-request .spin-on-load { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="min-h-screen bg-base-200">

<header class="navbar bg-base-100 sticky top-0 z-10 shadow-sm safe-top">
  <div class="flex-1 px-2 flex items-center gap-3">
    <span class="text-lg font-semibold tracking-tight">Dotty</span>
    <span id="dotty-face" data-poll
          hx-get="/ui/face" hx-trigger="load, every 8s, dotty-refresh from:window" hx-swap="innerHTML"
          class="leading-none"></span>
    <span class="text-xs text-base-content/50 hidden sm:inline">admin</span>
  </div>
  <div class="flex-none">
    <button type="button" id="refresh-btn" class="btn btn-primary btn-sm gap-2"
            onclick="window.dispatchEvent(new CustomEvent('dotty-refresh')); var l=this.querySelector('.label'); var t=l.textContent; l.textContent='refreshed'; setTimeout(function(){l.textContent=t;}, 1000);"
            aria-label="Refresh all tiles">
      <span class="text-base leading-none">🔄</span>
      <span class="label">Refresh</span>
    </button>
  </div>
</header>

<main class="p-3 space-y-5 max-w-5xl mx-auto">

  <section>
    <h2 class="text-xs uppercase tracking-wider text-base-content/60 mb-2 px-1">Volume</h2>
    <div class="card bg-base-100 shadow-sm">
      <div class="card-body p-3">
        <form hx-post="/ui/actions/volume" hx-target="#vol-result" hx-swap="innerHTML"
              hx-include="this"
              class="flex items-center gap-3">
          <span class="text-base">🔈</span>
          <input type="range" name="value" min="0" max="100" step="5" value="50"
                 oninput="document.getElementById('vol-out').textContent = this.value"
                 class="range range-sm flex-1">
          <span class="text-base">🔊</span>
          <output id="vol-out" class="text-sm font-mono w-8 text-right">50</output>
        </form>
        <div id="vol-result" class="mt-2 empty:hidden"></div>
      </div>
    </div>
  </section>

  <section>
    <h2 class="text-xs uppercase tracking-wider text-base-content/60 mb-2 px-1">Mode</h2>
    <div id="kid-card-body" class="card bg-base-100 shadow-sm overflow-hidden"
         hx-get="/ui/kid-mode" hx-trigger="load" hx-swap="outerHTML"
         hx-target="this">
      <div class="card-body p-3 animate-pulse">
        <div class="h-4 bg-base-300 rounded w-1/4"></div>
      </div>
    </div>
  </section>

  <section>
    <h2 class="text-xs uppercase tracking-wider text-base-content/60 mb-2 px-1">Say something</h2>
    <div class="card bg-base-100 shadow-sm">
      <div class="card-body p-3">
        <form hx-post="/ui/actions/say" hx-target="#say-result" hx-swap="innerHTML"
              hx-disabled-elt="find button, find input"
              hx-on::after-request="if(event.detail.successful)this.reset()"
              class="flex flex-col sm:flex-row gap-2">
          <input type="text" name="text" placeholder="Type something for Dotty to say…"
                 class="input input-bordered flex-1" maxlength="500" autocomplete="off"
                 enterkeyhint="send" required>
          <button type="submit" class="btn btn-primary min-h-12">
            <span class="htmx-indicator-hide">Send</span>
            <span class="loading loading-spinner loading-sm htmx-indicator-show hidden"></span>
          </button>
        </form>
        <div id="say-result" class="mt-2 empty:hidden"></div>
      </div>
    </div>
  </section>

  <section>
    <h2 class="text-xs uppercase tracking-wider text-base-content/60 mb-2 px-1">Hosts</h2>
    <div id="cards" data-poll
         class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 gap-3"
         hx-get="/ui/cards" hx-trigger="load, every 10s, dotty-refresh from:window" hx-swap="innerHTML">
      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4 animate-pulse">
          <div class="h-4 bg-base-300 rounded w-1/3"></div>
          <div class="h-3 bg-base-300 rounded w-2/3 mt-2"></div>
        </div>
      </div>
    </div>
  </section>

  <section>
    <h2 class="text-xs uppercase tracking-wider text-base-content/60 mb-2 px-1">Faces &amp; dance</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-3">
          <div class="text-xs text-base-content/60 mb-2">Make a face</div>
          <div class="grid grid-cols-5 gap-1">
            {% for e in ["😊","😆","😢","😮","🤔","😠","😐","😍","😴"] %}
            <form hx-post="/ui/actions/mood" hx-target="#mood-result" hx-swap="innerHTML">
              <input type="hidden" name="emoji" value="{{ e }}">
              <button type="submit" class="btn btn-ghost text-2xl min-h-12 w-full p-0">{{ e }}</button>
            </form>
            {% endfor %}
          </div>
          <div id="mood-result" class="mt-2 empty:hidden"></div>
        </div>
      </div>
      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-3">
          <div class="text-xs text-base-content/60 mb-2">Dance &amp; sing</div>
          <div class="grid grid-cols-2 gap-2">
            <form hx-post="/ui/actions/dance" hx-target="#dance-result" hx-swap="innerHTML">
              <input type="hidden" name="key" value="macarena">
              <button class="btn btn-outline w-full min-h-12">💃 Macarena</button>
            </form>
            <form hx-post="/ui/actions/dance" hx-target="#dance-result" hx-swap="innerHTML">
              <input type="hidden" name="key" value="sing">
              <button class="btn btn-outline w-full min-h-12">🎤 Sing</button>
            </form>
          </div>
          <div id="dance-result" class="mt-2 empty:hidden"></div>
        </div>
      </div>
    </div>
  </section>

  <section>
    <h2 class="text-xs uppercase tracking-wider text-base-content/60 mb-2 px-1">Vision</h2>
    <div id="vision" data-poll class="card bg-base-100 shadow-sm overflow-hidden"
         hx-get="/ui/vision/latest" hx-trigger="load, every 10s, dotty-refresh from:window" hx-swap="innerHTML">
      <div class="card-body p-3 animate-pulse">
        <div class="h-4 bg-base-300 rounded w-1/3"></div>
      </div>
    </div>
  </section>

  <section>
    <h2 class="text-xs uppercase tracking-wider text-base-content/60 mb-2 px-1">System</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div id="metrics" data-poll class="card bg-base-100 shadow-sm overflow-hidden"
           hx-get="/ui/metrics" hx-trigger="load, every 15s, dotty-refresh from:window" hx-swap="innerHTML">
        <div class="card-body p-3 animate-pulse">
          <div class="h-4 bg-base-300 rounded w-1/3"></div>
        </div>
      </div>
      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-3">
          <div class="text-xs text-base-content/60 mb-2">Service</div>
          <div class="flex flex-col gap-2">
            <button class="btn btn-warning btn-sm w-full"
                    hx-post="/ui/actions/restart-bridge"
                    hx-target="#restart-result" hx-swap="innerHTML"
                    hx-confirm="Restart the bridge? Voice and logs will pause for ~5s.">
              Restart bridge
            </button>
            <button class="btn btn-outline btn-sm w-full"
                    hx-post="/ui/actions/update-bridge"
                    hx-target="#restart-result" hx-swap="innerHTML"
                    hx-confirm="Pull the latest bridge code from GitHub and restart? The previous version is kept as bridge.py.prev / bridge.prev.">
              Update from GitHub
            </button>
          </div>
          <div id="restart-result" class="mt-2 empty:hidden"></div>
        </div>
      </div>
      <div id="persona-card" class="card bg-base-100 shadow-sm overflow-hidden"
           hx-get="/ui/persona" hx-trigger="load" hx-target="this" hx-swap="outerHTML">
        <div class="card-body p-3 animate-pulse">
          <div class="h-4 bg-base-300 rounded w-1/4"></div>
        </div>
      </div>
    </div>
  </section>

  <section>
    <h2 class="text-xs uppercase tracking-wider text-base-content/60 mb-2 px-1">Recent conversation</h2>
    <div id="logs" data-poll class="card bg-base-100 shadow-sm overflow-hidden"
         hx-get="/ui/logs" hx-trigger="load, every 15s, dotty-refresh from:window" hx-swap="innerHTML"
         hx-include="#log-date">
      <div class="card-body p-4 animate-pulse">
        <div class="h-4 bg-base-300 rounded w-1/2"></div>
      </div>
    </div>
  </section>

  <footer class="text-center text-xs text-base-content/40 pt-4 pb-6">
    auto-refresh: hosts 10s &middot; logs 15s
  </footer>

</main>

<div id="error-toast" class="toast toast-top toast-center hidden z-50">
  <div class="alert alert-error">
    <span id="error-toast-msg"></span>
  </div>
</div>

<script>
  (function () {
    if (typeof EventSource === 'undefined') return;
    var src = new EventSource('/ui/events');
    src.onmessage = function (ev) {
      var data;
      try { data = JSON.parse(ev.data); } catch (e) { return; }
      // Live log tail (P13) — fire the same window event the refresh
      // button uses so every polling tile picks up new state immediately.
      window.dispatchEvent(new CustomEvent('dotty-refresh'));
      // Error toast (P12) — surface failed turns even when the dashboard
      // is parked in the background.
      if (data && data.error) {
        var toast = document.getElementById('error-toast');
        var msg = document.getElementById('error-toast-msg');
        if (toast && msg) {
          msg.textContent = 'Dotty error: ' + String(data.error);
          toast.classList.remove('hidden');
          setTimeout(function () { toast.classList.add('hidden'); }, 8000);
        }
      }
    };
    src.onerror = function () { /* EventSource auto-reconnects */ };
  })();
</script>

</body>
</html>
