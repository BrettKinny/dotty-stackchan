<div class="card-body p-3">
  <form hx-post="/ui/actions/kid-mode" hx-target="#kid-result" hx-swap="innerHTML"
        class="flex items-center justify-between gap-3">
    <div class="min-w-0">
      <div class="font-semibold text-sm">Kid Mode</div>
      <div class="text-xs text-base-content/60">
        {% if enabled %}safety rules + camera off{% else %}adult mode &middot; full capabilities{% endif %}
      </div>
    </div>
    <input type="hidden" name="enabled" value="{{ 'false' if enabled else 'true' }}">
    <label class="swap swap-rotate">
      <input type="checkbox" {% if enabled %}checked{% endif %}
             onchange="this.form.querySelector('[name=enabled]').value = this.checked ? 'true' : 'false'; this.form.requestSubmit();"
             {% if not available %}disabled{% endif %}>
      <span class="swap-on text-success">●</span>
      <span class="swap-off text-base-content/40">○</span>
    </label>
  </form>
  <div id="kid-result" class="mt-2 empty:hidden"></div>
</div>
