{# Kebab (⋮) menu items for the dashboard header. Order: Theme, Update,
   Reboot. The Reboot item triggers the bridge's combined reboot-all path
   (firmware reboot via inject + xiaozhi container restart on Unraid via SSH
   + delayed bridge self-restart). #}
<ul class="menu menu-sm dropdown-content bg-base-100 rounded-box z-30 w-60 p-2 shadow-lg mt-2">
  <li>
    <button type="button" data-gear-item
            onclick="var d=document.documentElement;var n=d.getAttribute('data-theme')==='dark'?'light':'dark';d.setAttribute('data-theme',n);try{localStorage.setItem('dotty-theme',n)}catch(e){}">
      <span aria-hidden="true">🌓</span> Theme
    </button>
  </li>
  <li>
    <button type="button" data-gear-item
            hx-post="/ui/actions/preview-update"
            hx-target="#update-modal-content" hx-swap="innerHTML"
            hx-disabled-elt="this"
            hx-on::after-request="document.getElementById('update-modal').showModal()">
      <span aria-hidden="true">⬇</span> Update
    </button>
  </li>
  <li>
    <button type="button" data-gear-item class="text-warning"
            hx-post="/ui/actions/reboot-all"
            hx-target="#restart-result" hx-swap="innerHTML"
            hx-confirm="Restart bridge + server + robot — about 30 seconds outage. Confirm?">
      <span aria-hidden="true">🔄</span> Reboot
    </button>
  </li>
</ul>
